# Application Configuration
app.name=Service Claim Reconciliation Automation
app.version=1.0.0
app.environment=development

# Processing Configuration
batch.size=100
thread.count=1
max.retries=3

# Logging Configuration
log.level=INFO
log.file=./logs/reconciliation.log

# Feature Flags
enable.email.notification=false
enable.database.backup=false
